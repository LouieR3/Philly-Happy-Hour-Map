<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mappy Hour · Admin Access</title>
  <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --primary: #2563eb;
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
      --error: #ef4444;
    }

    /* Hide until auth check completes */
    body { display: none; }
    body.auth-complete { display: flex; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-container {
      background: var(--surface);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 380px;
      overflow: hidden;
    }

    /* Stage Transitions */
    .stage { display: none; }
    .stage.active { display: block; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Captcha Styling */
    .instruction { margin-bottom: 20px; text-align: center; }
    .instruction h2 { font-family: 'Montserrat'; font-size: 1.1rem; color: var(--primary); }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .tile {
      aspect-ratio: 1/1;
      background-size: cover;
      background-position: center;
      cursor: pointer;
      border-radius: 8px;
      border: 3px solid transparent;
      transition: all 0.2s;
    }

    .tile.selected { border-color: var(--primary); filter: brightness(0.7); }

    /* Password Stage Styling */
    .input-group { margin-bottom: 20px; }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      color: white;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
    }

    .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 10px; text-align: center; min-height: 1.2rem; }
  </style>
</head>
<body>

<div class="login-container">
  
  <div id="stage-captcha" class="stage active">
    <div class="instruction">
      <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 5px;">Step 1: Security Sequence</p>
      <h2>Select the Vetruvian Man</h2>
    </div>
    <div class="grid" id="captcha-grid"></div>
    <button onclick="verifyCaptcha()">Verify Identity</button>
  </div>

  <div id="stage-password" class="stage">
    <div class="instruction">
      <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 5px;">Step 2: Authenticate</p>
      <h2>Enter Administrator Password</h2>
    </div>
    <div class="input-group">
      <input type="password" id="admin-password" placeholder="••••••••" onkeypress="if(event.key==='Enter') handleLogin()">
    </div>
    <button id="login-btn" onclick="handleLogin()">Sign In</button>
  </div>

  <div id="global-error" class="error-msg"></div>
</div>

<script>
  const API_BASE = window.location.hostname === 'localhost' 
    ? 'http://localhost:3000' 
    : 'https://philly-happy-hour-map-production.up.railway.app';

  // Check auth before showing page
  async function checkAuthBeforeRender() {
    try {
      // Check if user is fully authenticated (has adminToken)
      const authRes = await fetch(`${API_BASE}/admin/check-auth`, {
        credentials: 'include'
      });
      
      if (authRes.ok) {
        // User is fully authenticated, redirect to admin dashboard
        // console.log('[Auth] User already authenticated, redirecting to admin');
        window.location.href = 'admin.html';
        return;
      }
      
      // Check if user passed captcha (has captchaPassed cookie)
      const captchaRes = await fetch(`${API_BASE}/admin/check-captcha`, {
        credentials: 'include'
      });
      
      if (captchaRes.ok) {
        // User passed captcha, show password stage
        // console.log('[Auth] Captcha passed, showing password stage');
        document.body.classList.add('auth-complete');
        document.getElementById('stage-captcha').classList.remove('active');
        document.getElementById('stage-password').classList.add('active');
      } else {
        // Fresh start, show captcha stage
        // console.log('[Auth] New user, showing captcha stage');
        document.body.classList.add('auth-complete');
      }
    } catch (err) {
    //   console.error('[Auth] Check failed:', err);
      // On error, show captcha stage anyway
      document.body.classList.add('auth-complete');
    }
  }

  // Run auth check immediately if document already loaded, or on DOMContentLoaded
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', checkAuthBeforeRender);
  } else {
    checkAuthBeforeRender();
  }

  let selectedIndices = [];
  const gridIndices = [0,1,2,3,4,5,6,7,8];

  // Shuffle helper
  function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  // Initialize Grid
  const grid = document.getElementById('captcha-grid');
  
  shuffle(gridIndices);  // Shuffle on each load
  
  gridIndices.forEach(idx => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    
    // 1. Try loading as .jpg first
    const jpgUrl = `assets/img/captcha/${idx}.jpg`;
    const pngUrl = `assets/img/captcha/${idx}.png`;
    
    tile.style.backgroundImage = `url('${jpgUrl}')`;

    // 2. Error handling: if .jpg fails, try .png
    // We create a temporary image object to test the URL
    const imgTester = new Image();
    imgTester.src = jpgUrl;
    
    imgTester.onerror = () => {
      // If the .jpg didn't work, switch the tile to .png
      tile.style.backgroundImage = `url('${pngUrl}')`;
    };

    tile.onclick = () => {
      if (selectedIndices.includes(idx)) {
        selectedIndices = selectedIndices.filter(i => i !== idx);
        tile.classList.remove('selected');
      } else {
        selectedIndices.push(idx);
        tile.classList.add('selected');
      }
    };
    grid.appendChild(tile);
  });

  async function verifyCaptcha() {
    const errorEl = document.getElementById('global-error');
    errorEl.textContent = "";

    // console.log('[Captcha] Verifying selection:', selectedIndices);

    try {
      const res = await fetch(`${API_BASE}/api/verify-captcha`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selectedIndices })
      });

    //   console.log('[Captcha] Response status:', res.status);

      if (res.ok) {
        // console.log('[Captcha] ✓ Correct! Setting captchaPassed cookie and showing password stage');
        document.getElementById('stage-captcha').classList.remove('active');
        document.getElementById('stage-password').classList.add('active');
      } else {
        const data = await res.json();
        // console.log('[Captcha] ✗ Incorrect:', data.error);
        errorEl.textContent = data.error || "Identity verification failed.";
        selectedIndices = [];
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
      }
    } catch (err) {
    //   console.error('[Captcha] Exception:', err);
      errorEl.textContent = "Server error.";
    }
  }

  async function handleLogin() {
    const pw = document.getElementById('admin-password').value;
    const errorEl = document.getElementById('global-error');
    
    if (!pw) {
      errorEl.textContent = "Please enter a password.";
      return;
    }
    
    try {
    //   console.log('[Login] Attempting password login...');
      const res = await fetch(`${API_BASE}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ password: pw })
      });

    //   console.log('[Login] Response status:', res.status);
      
      if (res.ok) {
        // console.log('[Login] Success! Token cookie set, redirecting to admin.html');
        window.location.href = 'admin.html';
      } else {
        const data = await res.json();
        // console.log('[Login] Error response:', data);
        errorEl.textContent = data.error || "Login failed.";
        document.getElementById('admin-password').value = "";
      }
    } catch (err) {
    //   console.error('[Login] Exception:', err);
      errorEl.textContent = "Connection error. Check server running?";
    }
  }
</script>

</body>
</html>

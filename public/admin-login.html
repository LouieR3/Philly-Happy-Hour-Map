<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mappy Hour · Admin Access</title>
  <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --primary: #2563eb;
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
      --error: #ef4444;
    }

    /* Hide until auth check completes */
    body { display: none; }
    body.auth-complete { display: flex; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-container {
      background: var(--surface);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 380px;
      overflow: hidden;
    }

    /* Stage Transitions */
    .stage { display: none; }
    .stage.active { display: block; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Captcha Styling */
    .instruction { margin-bottom: 20px; text-align: center; }
    .instruction h2 { font-family: 'Montserrat'; font-size: 1.1rem; color: var(--primary); }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .tile {
      aspect-ratio: 1/1;
      background-size: cover;
      background-position: center;
      cursor: pointer;
      border-radius: 8px;
      border: 3px solid transparent;
      transition: all 0.2s;
    }

    .tile.selected { border-color: var(--primary); filter: brightness(0.7); }

    /* Password Stage Styling */
    .input-group { margin-bottom: 20px; }
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    input[type="password"], input[type="text"].pw-input {
      width: 100%;
      padding: 12px 44px 12px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .eye-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      width: auto;
      padding: 4px;
      color: #94a3b8;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .eye-btn:hover { color: #e2e8f0; }

    button {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      color: white;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
    }

    .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 10px; text-align: center; min-height: 1.2rem; }
  </style>
</head>
<body>

<div class="login-container">
  
  <div id="stage-captcha" class="stage active">
    <div class="instruction">
      <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 5px;">Step 1: Security Sequence</p>
      <h2>Select the Vetruvian Man</h2>
    </div>
    <div class="grid" id="captcha-grid"></div>
    <button onclick="verifyCaptcha()">Verify Identity</button>

    <div style="display:flex;align-items:center;gap:10px;margin:18px 0 12px;color:#64748b;font-size:0.8rem;">
      <span style="flex:1;height:1px;background:#334155;"></span>OR<span style="flex:1;height:1px;background:#334155;"></span>
    </div>
    <button type="button" id="google-admin-btn" style="background:#fff;color:#1e293b;display:flex;align-items:center;justify-content:center;gap:8px;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <p style="font-size:0.72rem;opacity:0.6;text-align:center;margin-top:10px;">Authorized admin accounts only.</p>
  </div>

  <div id="stage-password" class="stage">
    <div class="instruction">
      <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 5px;">Step 2: Authenticate</p>
      <h2>Enter Administrator Password</h2>
    </div>
    <div class="input-group">
      <div class="password-wrapper">
        <input type="password" id="admin-password" class="pw-input" placeholder="••••••••" onkeypress="if(event.key==='Enter') handleLogin()">
        <button class="eye-btn" type="button" onclick="togglePasswordVisibility()" id="eye-btn" aria-label="Toggle password visibility">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <button id="login-btn" onclick="handleLogin()">Sign In</button>
  </div>

  <div id="global-error" class="error-msg"></div>
</div>

<script>
  const API_BASE = window.location.hostname === 'localhost'
    ? 'http://localhost:3000'
    : 'https://philly-happy-hour-map-production.up.railway.app';

  // Check auth before showing page
  async function checkAuthBeforeRender() {
    try {
      console.log('[Auth] Starting auth check on hostname:', window.location.hostname);
      
      // Check if user is fully authenticated (has adminToken)
      const authRes = await fetch(`${API_BASE}/admin/check-auth`, {
        credentials: 'include',
        method: 'GET'
      });
      
      console.log(`[Auth] check-auth response: ${authRes.status}`, authRes.status === 200 ? '✓' : '✗');
      
      if (authRes.ok) {
        // User is fully authenticated, redirect to admin dashboard
        console.log('[Auth] User already authenticated, redirecting to admin');
        window.location.href = 'admin.html';
        return;
      }
      
      // Check if user passed captcha (has captchaPassed cookie)
      const captchaRes = await fetch(`${API_BASE}/admin/check-captcha`, {
        credentials: 'include',
        method: 'GET'
      });
      
      console.log(`[Auth] check-captcha response: ${captchaRes.status}`, captchaRes.status === 200 ? '✓' : '✗');
      
      if (captchaRes.ok) {
        // User passed captcha, show password stage
        console.log('[Auth] Captcha passed, showing password stage');
        document.body.classList.add('auth-complete');
        document.getElementById('stage-captcha').classList.remove('active');
        document.getElementById('stage-password').classList.add('active');
      } else {
        // Fresh start, show captcha stage
        console.log('[Auth] New user, showing captcha stage');
        document.body.classList.add('auth-complete');
      }
    } catch (err) {
      console.error('[Auth] Check failed:', err);
      // On error, show captcha stage anyway
      document.body.classList.add('auth-complete');
    }
  }

  // Run auth check immediately if document already loaded, or on DOMContentLoaded
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', checkAuthBeforeRender);
  } else {
    checkAuthBeforeRender();
  }

  let captchaToken = null; // held in memory after captcha passes
  let selectedIndices = [];
  const gridIndices = [0,1,2,3,4,5,6,7,8];

  // Shuffle helper
  function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  // Initialize Grid
  const grid = document.getElementById('captcha-grid');
  
  shuffle(gridIndices);  // Shuffle on each load
  
  gridIndices.forEach(idx => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    
    // 1. Try loading as .jpg first
    const jpgUrl = `assets/img/captcha/${idx}.jpg`;
    const pngUrl = `assets/img/captcha/${idx}.png`;
    
    tile.style.backgroundImage = `url('${jpgUrl}')`;

    // 2. Error handling: if .jpg fails, try .png
    // We create a temporary image object to test the URL
    const imgTester = new Image();
    imgTester.src = jpgUrl;
    
    imgTester.onerror = () => {
      // If the .jpg didn't work, switch the tile to .png
      tile.style.backgroundImage = `url('${pngUrl}')`;
    };

    tile.onclick = () => {
      if (selectedIndices.includes(idx)) {
        selectedIndices = selectedIndices.filter(i => i !== idx);
        tile.classList.remove('selected');
      } else {
        selectedIndices.push(idx);
        tile.classList.add('selected');
      }
    };
    grid.appendChild(tile);
  });

  async function verifyCaptcha() {
    const errorEl = document.getElementById('global-error');
    errorEl.textContent = "";

    console.log('[Captcha] Verifying selection:', selectedIndices);

    try {
      const res = await fetch(`${API_BASE}/api/verify-captcha`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ selectedIndices })
      });

      console.log('[Captcha] Response status:', res.status);

      if (res.ok) {
        const data = await res.json();
        captchaToken = data.token;
        console.log('[Captcha] ✓ Passed. Got token:', !!captchaToken);
        document.getElementById('stage-captcha').classList.remove('active');
        document.getElementById('stage-password').classList.add('active');
      } else {
        const data = await res.json();
        console.log('[Captcha] ✗ Incorrect:', data.error);
        errorEl.textContent = data.error || "Identity verification failed.";
        selectedIndices = [];
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
      }
    } catch (err) {
      console.error('[Captcha] Exception:', err);
      errorEl.textContent = "Server error.";
    }
  }

  function togglePasswordVisibility() {
    const input = document.getElementById('admin-password');
    const icon = document.getElementById('eye-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.innerHTML = isHidden
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  async function handleLogin() {
    const pw = document.getElementById('admin-password').value;
    const errorEl = document.getElementById('global-error');
    
    if (!pw) {
      errorEl.textContent = "Please enter a password.";
      return;
    }
    
    try {
      console.log('[Login] Attempting password login with captchaToken:', !!captchaToken);
      const res = await fetch(`${API_BASE}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ password: pw, captchaToken })
      });

      console.log('[Login] Response status:', res.status);
      
      if (res.ok) {
        console.log('[Login] ✓ Success! Checking if adminToken cookie was set...');
        // Verify the cookie was actually set before redirecting
        const checkRes = await fetch(`${API_BASE}/admin/check-auth`, {
          credentials: 'include'
        });
        console.log('[Login] Cookie verification:', checkRes.status, checkRes.ok ? '✓' : '✗');
        window.location.href = 'admin.html';
      } else {
        const data = await res.json();
        console.log('[Login] ✗ Error response:', data);
        errorEl.textContent = data.error || "Login failed.";
        document.getElementById('admin-password').value = "";
      }
    } catch (err) {
      console.error('[Login] Exception:', err);
      errorEl.textContent = "Connection error. Check server running?";
    }
  }
</script>

<!-- Google (identity-based) admin sign-in. Admins listed in ADMIN_EMAILS are
     granted an admin session by the server without the captcha+password path. -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyAK2bb2zN7ibRWsgc7SSU5ibUOHwpbksEI",
    authDomain:        "mappy-hour-39fb6.firebaseapp.com",
    projectId:         "mappy-hour-39fb6",
    storageBucket:     "mappy-hour-39fb6.appspot.com",
    messagingSenderId: "83158396400",
    appId:             "1:83158396400:web:63f5f70d82130c47068135",
  };

  const auth     = getAuth(initializeApp(firebaseConfig));
  const provider = new GoogleAuthProvider();

  // Module scope can't see the classic script's `const API_BASE`, so derive it here too.
  const API_BASE = window.location.hostname === 'localhost'
    ? 'http://localhost:3000'
    : 'https://philly-happy-hour-map-production.up.railway.app';

  document.getElementById('google-admin-btn').addEventListener('click', async () => {
    const errorEl = document.getElementById('global-error');
    errorEl.textContent = '';
    try {
      const cred  = await signInWithPopup(auth, provider);
      const token = await cred.user.getIdToken();
      // Server verifies the token's signature and checks the email against
      // ADMIN_EMAILS before issuing the signed admin session cookie.
      const res = await fetch(`${API_BASE}/admin/firebase-login`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (res.ok) {
        window.location.href = 'admin.html';
      } else {
        const data = await res.json().catch(() => ({}));
        errorEl.textContent = data.error || 'This account is not authorized for admin access.';
      }
    } catch (err) {
      console.error('[Google Admin] sign-in error:', err);
      errorEl.textContent = 'Google sign-in failed.';
    }
  });
</script>

</body>
</html>

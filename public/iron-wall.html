<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mappy Hour · Security Check</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Lato&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .captcha-card {
      background: var(--surface);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 350px;
    }

    .instruction {
      background: var(--primary);
      margin: -24px -24px 20px -24px;
      padding: 20px;
      border-radius: 12px 12px 0 0;
    }

    .instruction h2 {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.2rem;
      text-transform: uppercase;
    }

    .instruction p {
      margin: 5px 0 0 0;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .tile {
      aspect-ratio: 1 / 1;
      background-size: cover;
      background-position: center;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      transition: transform 0.1s;
    }

    .tile.selected {
      border-color: var(--primary);
      transform: scale(0.95);
    }

    .tile.selected::after {
      content: '✓';
      position: absolute;
      top: 5px;
      left: 5px;
      background: var(--primary);
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .verify-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #msg {
      text-align: center;
      margin-top: 15px;
      color: #ef4444;
      font-size: 0.85rem;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>

<div class="captcha-card">
  <div class="instruction">
    <p>Select all squares with</p>
    <h2>the vertruvian man</h2> </div>

  <div class="grid" id="captcha-grid">
    </div>

  <button class="verify-btn" onclick="verify()">Verify</button>
  <div id="msg"></div>
</div>

<script>
  const API_BASE = window.location.hostname === 'localhost' 
    ? 'http://localhost:3000' 
    : 'https://philly-happy-hour-map-production.up.railway.app';

  // Array of image indices 0-8
  let indices = [0, 1, 2, 3, 4, 5, 6, 7, 8];
  let selected = [];

  // 1. Shuffle helper (Optional: if you want the grid to look different each time)
  function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  // 2. Render Grid
  const gridEl = document.getElementById('captcha-grid');
  shuffle(indices); // Uncomment to randomize positions

  // Helper to load image — try .jpg first, fall back to .png
  function setTileImage(tile, idx) {
    const img = new Image();
    img.onload = () => {
      tile.style.backgroundImage = `url('assets/img/captcha/${idx}.jpg')`;
    };
    img.onerror = () => {
      tile.style.backgroundImage = `url('assets/img/captcha/${idx}.png')`;
    };
    img.src = `assets/img/captcha/${idx}.jpg`;
  }

  indices.forEach(idx => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.index = idx;  // Store index for debugging
    setTileImage(tile, idx);
    tile.onclick = () => {
      tile.classList.toggle('selected');
      if (selected.includes(idx)) {
        selected = selected.filter(i => i !== idx);
        console.log('[Captcha] Deselected tile', idx, '→', selected);
      } else {
        selected.push(idx);
        console.log('[Captcha] Selected tile', idx, '→', selected);
      }
    };
    gridEl.appendChild(tile);
  });

  // 3. Submit
  async function verify() {
    const msg = document.getElementById('msg');
    console.log('[Captcha] User selected indices:', selected);
    console.log('[Captcha] User selected', selected.length, 'tiles');
    
    try {
      const res = await fetch(`${API_BASE}/api/verify-captcha`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selectedIndices: selected })
      });

      const data = await res.json();
      console.log('[Captcha] Response status:', res.status);
      console.log('[Captcha] Response:', data);

      if (res.ok) {
        console.log('[Captcha] ✓ Correct! Resetting failure count and redirecting...');
        // Clear failure counter on success
        localStorage.removeItem('captchaFailures');
        window.location.href = 'admin-login.html';
      } else {
        console.log('[Captcha] ✗ Incorrect. Error:', data.error);
        msg.textContent = data.error || "Incorrect selection or wrong order. Try again.";
        
        // Increment failure counter
        let failures = parseInt(localStorage.getItem('captchaFailures') || '0');
        failures++;
        console.log('[Captcha] Failure count:', failures);
        localStorage.setItem('captchaFailures', failures);
        
        // Redirect to YouTube after 3 failures
        if (failures >= 3) {
          console.log('[Captcha] ✗ 3 failures reached. Redirecting to YouTube...');
          localStorage.removeItem('captchaFailures');
          window.location.href = 'https://www.youtube.com/watch?v=N-7gbWKbXbQ';
        }
      }
    } catch (err) {
      console.error('[Captcha] Exception:', err);
      console.error('[Captcha] Stack:', err.stack);
      msg.textContent = "Connection error. Restart server?";
    }
  }
</script>
</body>
</html>

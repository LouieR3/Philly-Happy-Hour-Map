<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>My Profile · Mappy Hour</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@300..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css" />
    <link href="css/styles.css" rel="stylesheet" />
    <link href="css/nav-style.css" rel="stylesheet" />
    <link href="css/dark-theme.css" rel="stylesheet" />
    <style>
      body { min-height: 100vh; }
      .profile-wrap { max-width: 760px; margin: 0 auto; padding: 90px 16px 48px; }
      .profile-head { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
      .profile-avatar {
        width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
        border: 2px solid var(--mh-green-br); background: var(--mh-dark-3);
        display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--mh-green-br);
      }
      .profile-name { font-size: 1.3rem; font-weight: 600; color: var(--mh-text); margin: 0; }
      .profile-email { font-size: 0.9rem; color: var(--mh-text-muted); margin: 2px 0 0; }
      .profile-section-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mh-text-muted); margin: 28px 0 12px; }
      .sub-card {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        background: var(--mh-dark-2); border: 1px solid var(--mh-border); border-radius: 10px;
        padding: 12px 16px; margin-bottom: 8px;
      }
      .sub-name { font-weight: 600; color: var(--mh-text); }
      .sub-meta { font-size: 0.78rem; color: var(--mh-text-muted); margin-top: 2px; }
      .sub-badge { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.03em; }
      .sub-badge.pending  { background: rgba(251,191,36,0.14); color: #fbbf24; }
      .sub-badge.approved { background: rgba(52,211,153,0.16); color: var(--mh-green-br); }
      .sub-badge.rejected { background: rgba(248,113,113,0.16); color: #fca5a5; }
      .empty-note { color: var(--mh-text-muted); font-size: 0.92rem; padding: 14px 0; }
      .placeholder-card {
        background: var(--mh-dark-2); border: 1px dashed var(--mh-border); border-radius: 10px;
        padding: 20px; text-align: center; color: var(--mh-text-muted);
      }
      .signin-prompt { text-align: center; padding: 60px 16px; }
    </style>
  </head>
  <body id="page-top">
    <nav class="navbar navbar-expand-lg bg-secondary text-uppercase fixed-top" id="mainNav">
      <div class="container">
        <a class="navbar-brand" href="index.html">Mappy Hour</a>
        <div class="ms-auto d-flex align-items-center gap-2">
          <a class="btn btn-sm btn-outline-light py-1 px-3" href="index.html" style="font-size:0.8rem;"><i class="fa-solid fa-map me-1"></i> Map</a>
          <button id="profile-signout-btn" onclick="signOutUser()" class="btn btn-sm btn-outline-light py-1 px-3" style="display:none;font-size:0.8rem;">Sign out</button>
        </div>
      </div>
    </nav>

    <div class="profile-wrap">
      <!-- Signed-out state -->
      <div id="signin-prompt" class="signin-prompt" style="display:none;">
        <i class="fa-solid fa-user-lock" style="font-size:2.5rem;color:var(--mh-border);"></i>
        <h2 style="margin-top:16px;">Sign in to view your profile</h2>
        <p class="empty-note">Your submitted bars and saved places live here.</p>
        <button class="btn btn-primary mt-2" onclick="openAuthModal()">Sign in</button>
        <a class="btn btn-outline-light mt-2 ms-2" href="index.html">Back to map</a>
      </div>

      <!-- Loading -->
      <div id="profile-loading" class="empty-note" style="text-align:center;padding:60px 0;">
        <i class="fa-solid fa-spinner fa-spin"></i> Loading your profile…
      </div>

      <!-- Signed-in state -->
      <div id="profile-content" style="display:none;">
        <div class="profile-head">
          <img id="profile-avatar" class="profile-avatar" alt="" style="display:none;" />
          <div id="profile-avatar-fallback" class="profile-avatar"><i class="fa-solid fa-user"></i></div>
          <div>
            <p class="profile-name" id="profile-name">—</p>
            <p class="profile-email" id="profile-email"></p>
          </div>
        </div>

        <div class="profile-section-title">My submissions</div>
        <div id="submissions-list"></div>

        <div class="profile-section-title">Saved bars</div>
        <div class="placeholder-card">
          <i class="fa-solid fa-bookmark" style="font-size:1.4rem;display:block;margin-bottom:8px;"></i>
          Saving bars is coming soon — you'll be able to bookmark favorites here.
        </div>
      </div>
    </div>

    <!-- Sign-in modal (reuses auth.js wiring) -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="auth-modal-title" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width:400px;">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="auth-modal-title">Sign in</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <button type="button" id="auth-google-modal-btn" class="btn btn-outline-light w-100 mb-2">
              <i class="fab fa-google me-2"></i> Continue with Google
            </button>
            <div class="d-flex align-items-center gap-2 my-3" style="color:#94a3b8;font-size:0.8rem;">
              <span style="flex:1;height:1px;background:#2d3a4f;"></span>or<span style="flex:1;height:1px;background:#2d3a4f;"></span>
            </div>
            <form id="auth-email-form">
              <input type="email" id="auth-email" class="form-control mb-2" placeholder="Email" autocomplete="email" required />
              <input type="password" id="auth-password" class="form-control mb-2" placeholder="Password" autocomplete="current-password" required />
              <div id="auth-error" role="alert" style="color:#fca5a5;font-size:0.82rem;min-height:1rem;margin-bottom:8px;"></div>
              <button type="submit" id="auth-submit-btn" class="btn btn-primary w-100">Sign in</button>
            </form>
            <p id="auth-toggle-mode" class="text-center mt-3 mb-0" style="font-size:0.85rem;color:#94a3b8;">New here? <a href="#" role="button">Create an account</a></p>
          </div>
        </div>
      </div>
    </div>
    <style>#auth-toggle-mode a { color: #34d399; text-decoration: none; } #auth-toggle-mode a:hover { text-decoration: underline; }</style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script>
      const API_BASE = window.location.hostname === 'localhost'
        ? 'http://localhost:3000'
        : 'https://philly-happy-hour-map-production.up.railway.app';

      const KIND_LABELS = {
        'new-bar':      'New quizzo bar',
        'new-pool-bar': 'New pool bar',
        'edit':         'Quizzo edit',
        'pool-edit':    'Pool bar edit',
      };

      function show(id, on) { const el = document.getElementById(id); if (el) el.style.display = on ? '' : 'none'; }

      function renderSubmissions(subs) {
        const list = document.getElementById('submissions-list');
        if (!subs || !subs.length) {
          list.innerHTML = '<div class="empty-note">You haven\'t submitted any bars yet. Add or edit a bar from the map to see it here.</div>';
          return;
        }
        list.innerHTML = subs.map(s => {
          const when = s.submittedAt ? new Date(s.submittedAt).toLocaleDateString() : '';
          const status = (s.status || 'pending').toLowerCase();
          const esc = (t) => String(t == null ? '' : t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
          return `<div class="sub-card">
            <div>
              <div class="sub-name">${esc(s.name)}</div>
              <div class="sub-meta">${esc(KIND_LABELS[s.kind] || s.kind)}${when ? ' · ' + when : ''}</div>
            </div>
            <span class="sub-badge ${status}">${esc(status)}</span>
          </div>`;
        }).join('');
      }

      async function loadProfile(user) {
        show('signin-prompt', false);
        show('profile-loading', false);
        show('profile-content', true);
        document.getElementById('profile-signout-btn').style.display = '';

        document.getElementById('profile-name').textContent  = user.displayName || user.email || 'You';
        document.getElementById('profile-email').textContent = user.email || '';
        const av = document.getElementById('profile-avatar');
        const fb = document.getElementById('profile-avatar-fallback');
        if (user.photoURL) { av.src = user.photoURL; av.style.display = ''; fb.style.display = 'none'; }
        else { av.style.display = 'none'; fb.style.display = ''; }

        try {
          const res = await window.authedFetch(API_BASE + '/api/my-submissions');
          if (!res.ok) throw new Error('Could not load submissions');
          const data = await res.json();
          renderSubmissions(data.submissions);
        } catch (err) {
          document.getElementById('submissions-list').innerHTML =
            '<div class="empty-note">Could not load your submissions right now.</div>';
        }
      }

      function applyAuthState(user) {
        if (user) {
          loadProfile(user);
        } else {
          show('profile-loading', false);
          show('profile-content', false);
          show('signin-prompt', true);
          document.getElementById('profile-signout-btn').style.display = 'none';
        }
      }

      // React to Firebase auth state (auth.js dispatches this once resolved).
      document.addEventListener('auth-changed', (e) => applyAuthState(e.detail.user));
      // If auth already resolved before this listener attached, apply immediately.
      if (window.currentUser !== null && window.currentUser !== undefined) applyAuthState(window.currentUser);
    </script>
  </body>
</html>
